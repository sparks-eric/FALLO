            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const episodiClean = episodi.replace(/[^a-zA-Z0-9]/g, '_');
            const programaClean = programa.replace(/[^a-zA-Z0-9]/g, '_');
            const filename = episodiClean && programaClean ? `${programaClean}_${episodiClean}_AVID.txt` : episodiClean ? `${episodiClean}_AVID.txt` : programaClean ? `${programaClean}_AVID.txt` : 'marques-temps_AVID.txt';
            downloadFile(blob, filename);
}

// Descargar archivo
function downloadFile(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

        // Elementos adicionales del DOM
        const btnReset = document.getElementById('btnReset');
        const btnExportSession = document.getElementById('btnExportSession');
        const btnImportSession = document.getElementById('btnImportSession');
        const tcOffsetInput = document.getElementById('tcOffset');
        const btnTcMinus = document.getElementById('btnTcMinus');
        const btnTcPlus = document.getElementById('btnTcPlus');

        // Event listeners
        btnMark.addEventListener('click', addMark);
        btnBloc.addEventListener('click', addBloc);
        btnTcIn.addEventListener('click', addTcIn);
        btnTcOut.addEventListener('click', addTcOut);
        btnExportWord.addEventListener('click', exportToWord);
        btnExportPdf.addEventListener('click', exportToPdf);
        btnExportAvid.addEventListener('click', exportToAvid);
        btnReset.addEventListener('click', resetAll);
        btnExportSession.addEventListener('click', exportSession);
        btnImportSession.addEventListener('click', importSession);

        // Event listeners para TC offset
        btnTcMinus.addEventListener('click', () => {
            tcOffset -= 1;
            tcOffsetInput.value = tcOffset;
            saveToStorage();
        });

        btnTcPlus.addEventListener('click', () => {
            tcOffset += 1;
            tcOffsetInput.value = tcOffset;
            saveToStorage();
        });

        tcOffsetInput.addEventListener('change', () => {
            const val = parseInt(tcOffsetInput.value) || 0;
            if (val >= -3600 && val <= 3600) {
                tcOffset = val;
                saveToStorage();
            } else {
                tcOffsetInput.value = tcOffset;
            }
        });

        tcOffsetInput.addEventListener('input', () => {
            const val = parseInt(tcOffsetInput.value) || 0;
            if (val >= -3600 && val <= 3600) {
                tcOffset = val;
            }
        });

        // Guardar info al cambiar los campos
        infoPrograma.addEventListener('change', saveToStorage);
        infoEpisodi.addEventListener('change', saveToStorage);
        infoContingut.addEventListener('change', saveToStorage);
        infoData.addEventListener('change', saveToStorage);
        infoDataEmissio.addEventListener('change', saveToStorage);
        infoObservacions.addEventListener('change', saveToStorage);

        // Atajos de teclado
        document.addEventListener('keydown', (e) => {
            // Teclas de función: F1, F2, F3, F4 siempre actúan
            switch(e.code) {
                case 'F1':
                    e.preventDefault();
                    if (!btnTcIn.disabled) {
                        addTcIn();
                    }
                    return;
                case 'F2':
                    e.preventDefault();
                    if (!btnTcOut.disabled) {
                        addTcOut();
                    }
                    return;
                case 'F3':
                    e.preventDefault();
                    if (!btnMark.disabled) {
                        addMark();
                    }
                    return;
                case 'F4':
                    e.preventDefault();
                    if (!btnBloc.disabled) {
                        addBloc();
                    }
                    return;
            }

            // Escape: salir del input/textarea
            if (e.code === 'Escape') {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.classList.contains('mark-text')) {
                    e.preventDefault();
                    e.target.blur();
                }
                return;
            }

            // Ignorar otras teclas si está escribiendo en un input, textarea o campo de marcas
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.classList.contains('mark-text')) return;

            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    if (isRunning) {
                        pauseTimer();
                    } else if (elapsedSeconds > 0) {
                        startTimer();
                    } else {
                        startTimer();
                    }
                    break;
                case 'Enter':
                case 'NumpadAdd':
                    e.preventDefault();
                    addMark();
                    break;
            }
        });

        // Reiniciar todo
        function resetAll() {
            if (confirm('Segur que vols reiniciar?')) {
                isRunning = false;
                clearInterval(timerInterval);
                elapsedSeconds = 0;
                pausedTime = 0;
                startEpoch = null;
                marks = [];
                tcInTime = null;
                tcInMarkId = null;
                tcOffset = 0;
                tcOffsetInput.value = 0;

                // Limpiar campos de información
                infoPrograma.value = '';
                infoEpisodi.value = '';
                infoContingut.value = '';
                infoData.value = '';
                infoDataEmissio.value = '';
                infoObservacions.value = '';
                timerDisplay.classList.remove('recording');
                renderMarks();
                updateExportButtons();
                clearStorage();

                btnMark.disabled = false;
                btnBloc.disabled = false;
                btnTcIn.disabled = false;
                btnTcOut.disabled = true;
                updateTcButtons();
            }
        }

        // Exportar sesión a archivo JSON
        function exportSession() {
            const sessionData = {
                elapsedSeconds: elapsedSeconds,
                marks: marks,
                isRunning: isRunning,
                info: {
                    programa: infoPrograma.value || '',
                    episodi: infoEpisodi.value || '',
                    contingut: infoContingut.value || '',
                    data: infoData.value || '',
                    dataEmissio: infoDataEmissio.value || ''
                }
            };

            const json = JSON.stringify(sessionData, null, 2);
            const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
            
            const programa = infoPrograma.value || 'sessio';
            const episodi = infoEpisodi.value || '';
            const filename = episodi ? `${episodi}_${programa}_session.json` : `${programa}_session.json`;
            
            downloadFile(blob, filename);
        }

        // Importar sesión desde archivo JSON
        function importSession() {
            const fileInput = document.getElementById('sessionFileInput');
            fileInput.click();
        }

        // Procesar archivo importado
        document.getElementById('sessionFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const sessionData = JSON.parse(event.target.result);

                    // Cargar datos
                    elapsedSeconds = sessionData.elapsedSeconds || 0;
                    marks = sessionData.marks || [];
                    isRunning = false;
                    
                    // Cargar información
                    if (sessionData.info) {
                        infoPrograma.value = sessionData.info.programa || '';
                        infoEpisodi.value = sessionData.info.episodi || '';
                        infoContingut.value = sessionData.info.contingut || '';
                        infoData.value = sessionData.info.data || '';
                        infoDataEmissio.value = sessionData.info.dataEmissio || '';
                    }

                    // Actualizar display
                    updateDisplay();
                    renderMarks();
                    updateExportButtons();
                    saveToStorage();

                    alert('Sessió importada correctament!');
                } catch (error) {
                    alert('Error en importar la sessió: ' + error.message);
                }
            };
            reader.readAsText(file);

            // Resetear input para permitir seleccionar el mismo archivo otra vez
            e.target.value = '';
        });

        // Inicialización al cargar la página
        function init() {
            const wasRunning = loadFromStorage();

            // Cargar el offset en el input
            tcOffsetInput.value = tcOffset;

            // Si hi ha un TC IN pending, assegurar que esté ben establecido
            if (!tcInTime) {
                const pendingTc = marks.find((mark) => mark.type === 'tc' && !mark.timeOut);
                if (pendingTc) {
                    tcInTime = pendingTc.timeIn;
                    tcInMarkId = pendingTc.id;
                }
            }

            // Actualizar display del cronómetro
            updateDisplay();
            
            // Iniciar animación del TC con requestAnimationFrame (sincronizado con pantalla, ~60fps)
            // El TC debe mostrar la hora actual en todo momento con máxima precisión
            if (!tcInterval) {
                tcInterval = true; // Marcar como iniciado
                animateTc(); // Comienza la animación del TC
            }
            
            renderMarks();
            updateExportButtons();

            // Si había datos guardados y estaba corriendo, reanudar automáticamente
            if (wasRunning) {
                startTimer({ autoTcIn: false });
                updateTcButtons();
            } else {
                // Estado inicial: botones habilitados/deshabilitados correctamente
                btnMark.disabled = false;  // Permitir marcas de error fuera de tiempo
                btnBloc.disabled = false;  // Permitir separadores fuera de tiempo
                btnTcIn.disabled = false;
                btnTcOut.disabled = true;
                // Asegurar que los botones de exportación estén correctamente habilitados
                updateTcButtons();
            }
        }

        // Confirmar antes de cerrar la web si hay datos activos
        window.addEventListener('beforeunload', (e) => {
            // Mostrar confirmación si hay marcas, cronómetro activo o valores en los campos
            const hasMarks = marks.length > 0;
            const hasInfo = infoPrograma.value || infoEpisodi.value || infoContingut.value || infoData.value || infoDataEmissio.value;
            const hasTimer = elapsedSeconds > 0;

            if (hasMarks || hasInfo || hasTimer || isRunning) {
                // Guardar automáticamente antes de cerrar
                saveToStorage();
                
                // Prevenir cierre y mostrar diálogo del navegador
                e.preventDefault();
                // Los navegadores modernos ignoran el mensaje personalizado por seguridad,
                // pero seguirán mostrando el diálogo si devolvemos algo aquí
                e.returnValue = '';
            }
        });

        // Ejecutar inicialización
        init();

        // Registrar Service Worker para modo offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker registration failed: ', err);
            });
        }
    </script>
</body>
</html>
